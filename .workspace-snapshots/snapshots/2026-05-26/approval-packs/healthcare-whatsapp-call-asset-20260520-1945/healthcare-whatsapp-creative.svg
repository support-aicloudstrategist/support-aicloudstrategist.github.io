    <filter id="shadow" x="50" y="190" width="980" height="950" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#00131A" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1080" height="1350" rx="0" fill="url(#bg)"/>
  <circle cx="926" cy="170" r="210" fill="#31D0AA" opacity="0.13"/>
  <circle cx="127" cy="1171" r="260" fill="#4CC9F0" opacity="0.13"/>

