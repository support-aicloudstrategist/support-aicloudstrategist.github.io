<svg width="1080" height="1350" viewBox="0 0 1080 1350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#0D2A3A"/>
      <stop offset="1" stop-color="#0B5B64"/>
    </linearGradient>
    <linearGradient id="card" x1="90" y1="226" x2="990" y2="1084" gradientUnits="userSpaceOnUse">
